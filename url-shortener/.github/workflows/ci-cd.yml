name: CI/CD — URL Shortener

# ─────────────────────────────────────────────────────────────────
# Triggers:
#   - Every push to main or develop
#   - Every Pull Request targeting main
#
# Pipeline stages:
#   1. test    → Run unit tests + build verification
#   2. build   → Build Docker image and push to Docker Hub
#   3. deploy  → SSH into server and pull the latest image (main only)
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: url-shortener

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Spin up MySQL and Redis as service containers
    # These are available to the app at localhost during the job
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: url_shortener_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven                          # cache ~/.m2 between runs

      - name: Run tests
        run: mvn clean test
        env:
          # Point tests at the service containers
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/url_shortener_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          APP_BASE_URL: http://localhost:8080

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()                            # upload even if tests fail
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Build JAR (verify it compiles)
        run: mvn clean package -DskipTests

  # ── Job 2: Docker Build & Push ──────────────────────────────────
  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test                                 # only runs if tests pass
    if: github.ref == 'refs/heads/main'         # only on main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha               # GitHub Actions cache
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Server ─────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production                     # requires manual approval

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}      # EC2 IP or Railway host
          username: ${{ secrets.SERVER_USER }}  # ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}    # private key from GitHub Secrets
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest

            # Stop old container
            docker stop url-shortener-app 2>/dev/null || true
            docker rm   url-shortener-app 2>/dev/null || true

            # Start new container
            docker run -d \
              --name url-shortener-app \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DATABASE_USERNAME="${{ secrets.DATABASE_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e APP_BASE_URL="${{ secrets.APP_BASE_URL }}" \
              ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest

            # Health check
            sleep 8
            curl -f http://localhost:8080/api/health || exit 1
            echo "✅ Deployment successful"
