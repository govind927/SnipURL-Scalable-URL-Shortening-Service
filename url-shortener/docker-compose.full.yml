version: '3.8'

# ─────────────────────────────────────────────────────────────────
# Full stack Docker Compose — App + MySQL + Redis
# Runs the entire system with one command.
#
# Usage:
#   docker-compose -f docker-compose.full.yml up --build
#
# Note: docker-compose.yml (dev mode) only starts MySQL + Redis
#       and expects you to run the app via Spring Boot directly.
#       Use THIS file when you want to demo the fully containerised stack.
# ─────────────────────────────────────────────────────────────────

services:

  mysql:
    image: mysql:8.0
    container_name: url_shortener_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: url_shortener
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: url_shortener_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build: .
    container_name: url_shortener_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://mysql:3306/url_shortener?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      APP_BASE_URL: http://localhost:8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
