# ─────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy Configuration
# Sits in front of Spring Boot (localhost:8080)
#
# Install:  sudo apt install nginx
# Config:   sudo nano /etc/nginx/sites-available/url-shortener
# Enable:   sudo ln -s /etc/nginx/sites-available/url-shortener /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────

# Rate limiting zone — 10MB shared memory, 5 req/sec per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

server {
    listen 80;
    server_name _;       # Replace with your domain when available

    # ── Proxy all traffic to Spring Boot ────────────────────────
    location / {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        # Pass real client IP to the app (used for analytics + rate limiting)
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   Host            $host;
        proxy_set_header   Connection      "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Apply rate limiting on the shorten API ────────────────────
    location /api/shorten {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   Host            $host;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/html;
    gzip_min_length 1024;

    # ── Access logs ───────────────────────────────────────────────
    access_log /var/log/nginx/url-shortener-access.log;
    error_log  /var/log/nginx/url-shortener-error.log;
}
